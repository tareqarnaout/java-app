name: Java cli automation pipeline

on: 
  push:
    branches: [ main ]
  pull_request: 
    branches: [ main ]

jobs:
  compile-workspace-job:
    name: "Build and Validate Java Workspace Source"
    runs-on: ubuntu-latest  

    steps:
      - name: Synchronize Local Repository File Tree Context
        uses: actions/checkout@v4
      
      - name: Initialize Target Java SDK Virtual Environment Layer
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin' 
        
      - name: force gradle wrapper to have x writes
        run: chmod +x gradlew

      - name: execute application 
        run: ./gradlew build
      
      - name: push to docker hub
        uses: mr-smithers-excellent/docker-build-push@v6
        with:
          registry: docker.io
          username : ${{ secrets.DOCKER_USERNAME }}
          password : ${{ secrets.DOCKER_PASSWORD }}

          imageName: tareqarnaout/my-java-app
          tag: latest